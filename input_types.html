<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- HTML Input Types -->

    <h1>HTML Input Types Demo</h1>
    <form>
        <label> Enter Your Name</label>
        <input type="text" placeholder="Enter Your Name" /><br><br>
        <label>Enter Your Email</label>
        <input type="email" placeholder="Enter Your email" /><br><br>
        <label>Enter Your Password</label>
        <input type="password" placeholder="Enter Your Password" /><br><br>
        <label>Enter Your Phone Number</label><br><br>
        <input type="number" placeholder="Enter Phone Number" /><br><br>

        <label>Enter DOB</label><br><br>
        <input type="date" />
        <label>Enter MOnth</label><br><br>
        <input type="month" />
        <label>Enter Week</label><br><br>
        <input type="week" />
        <label>Enter Time</label><br><br>
        <input type="time" />
        <label>Enter Date & Time</label><br><br>
        <input type="datetime-local" /><br><br>

        <label>Choose Cities</label>
        <input type="checkbox" checked>Mumbai
        <input type="checkbox" checked>Pune
        <input type="checkbox">Solapur
        <input type="checkbox">Nashik <br><br>

        <label>Select Gender</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Others
        <br><br>

        <label>Select Color</label><br><br>
        <input type="color"><br><br>
        <label>Select Range</label>
        <input type="range"><br><br>
        <label>Upload your Photo</label>
        <input type="file"><br><br>
        <input type="file" multiple><br><br>

        <select>
            <option>Choose....</option>
            <option>Puran Poli</option>
            <option>Chicken Biryani</option>
            <option>Pizza</option>
            <option>Manchurian</option>
            <option>Aamras Puri</option>
            <option>Noodels</option>
        </select>
        <br><br>
        <label>Enter Address</label><br><br>
        <textarea >At Solapur</textarea><br>
        <textarea rows="5" cols="41"></textarea><br><br>

        <label> Sumit , Button , Reset</label><br><br>
        <input type="submit" value="Submit">
        <input type="button" value="Submit">
        <input type="reset" value="Reset">











    </form>
</body>

</html>
