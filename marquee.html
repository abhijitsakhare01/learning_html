<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Marquee scrolling Types -->
    <marquee scrolldelay="40">
        <h1>Hello Abhi</h1>
    </marquee>
    <marquee bgcolor="yellow" scrollamount="20" direction="right" behavior="alternate">
        <h1>Hello Abhi</h1>
    </marquee>
    <marquee bgcolor="yellow" direction="up" height="300px">
        <h1>Hello Abhi</h1>
    </marquee>

</body>

</html>
